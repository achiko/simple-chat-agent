x-common-env: &common-env
  NODE_ENV: production
  POSTGRES_URL: postgres://postgres:postgres@postgres:5432/chatui
  REDIS_URL: redis://redis:6379

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatui
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatui"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
    image: chat-ui-app:local
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      <<: *common-env
    command: ["pnpm", "db:migrate"]
    restart: "no"

  app:
    image: chat-ui-app:local
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      <<: *common-env
    ports:
      - "3000:3000"
    command: ["pnpm", "start"]
    restart: unless-stopped

  worker:
    image: chat-ui-app:local
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      <<: *common-env
    command: ["pnpm", "exec", "tsx", "worker/index.ts"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
